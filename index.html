<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>OnlyAccess - Plataforma Exclusiva</title>
    <style>
        /* Variables y Reset Básico */
        :root {
            --bg-color-fallback: #080808; 
            --overlay-color: rgba(0, 0, 0, 0.6); 
            --text-color: #f0f0f0;
            --gradient-start: #0077ff; 
            --gradient-end: #8a3ffc; 
            --heart-color: #4dc2ff; 
            --subtitle-color: #c9c9c9;
            --footer-link-color: #ccc; 
            --highlight-color: #ff33a8; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color-fallback);
            color: var(--text-color);
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden; 
        }

        /* ------------------------------------------------------------- */
        /* CONTENEDOR DE FONDO (COLLAGE CON 3 IMGS EN GRID) */
        .collage-container {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 0px; 
        }

        /* Capa de superposición para oscurecer el collage */
        .collage-container::before {
            content: '';
            position: absolute; 
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--overlay-color); 
            z-index: 1; 
        }
        
        /* Estilos base para CADA imagen del collage */
        .collage-img {
            width: 100%;       
            height: 100%;      
            object-fit: cover; 
            opacity: 1;        
            display: block;    
        }
        
        /* ALINEACIÓN INDIVIDUAL Y FINAL DE CADA IMAGEN */
        .img-1 {
            /* Mueve el punto focal ligeramente hacia abajo (5%) para mostrar más la base */
            object-position: center 95%; 
        }
        .img-2 {
            /* Se mantiene en la base de la foto (ideal para esta imagen de tenis) */
            object-position: bottom center; 
        }
        .img-3 {
            /* Mueve el punto focal ligeramente hacia arriba (85%) para mostrar menos base */
            object-position: center 85%;
        }


        /* ------------------------------------------------------------- */
        /* Contenedor Principal (SIN CAMBIOS) */
        .main-content {
            padding: 20px;
            max-width: 90%; 
            width: 400px; 
            z-index: 2; 
            background-color: rgba(0, 0, 0, 0.4); 
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); 
            margin: auto; 
            position: relative; 
        }

        /* Corazón / Logo, Títulos, Botones CSS... (SIN CAMBIOS) */
        .heart-icon {
            font-size: 3.5rem;
            color: var(--heart-color);
            display: block;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(77, 194, 255, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 0.95rem; 
            color: var(--subtitle-color);
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 25px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .primary-btn {
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
        }

        .primary-btn:hover {
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
            transform: translateY(-1px);
        }

        .secondary-btn {
            background-color: transparent;
            color: white;
            border: 2px solid #5a5a5a;
        }

        .secondary-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #777;
        }

        /* Footer y enlaces mejorados (SIN CAMBIOS) */
        .footer {
            position: relative; 
            margin-top: 20px; 
            padding-bottom: 20px; 
            width: 100%;
            font-size: 0.8rem; 
            color: var(--footer-link-color);
            z-index: 2; 
        }

        .footer-links-row-1, .footer-links-row-2 {
            display: flex; 
            justify-content: center;
            flex-wrap: wrap; 
        }
        
        .footer a {
            color: var(--footer-link-color);
            text-decoration: none;
            margin: 0 12px; 
            transition: color 0.3s ease;
            font-weight: 500;
            text-shadow: 0 0 4px rgba(204, 204, 204, 0.2); 
        }

        .footer a:hover {
            color: var(--text-color);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); 
        }

        .become-creator {
            margin-top: 10px;
        }

        .become-creator a {
            color: var(--highlight-color); 
            font-weight: bold;
            font-size: 0.85rem; 
            text-shadow: 
                0 0 5px var(--highlight-color),
                0 0 10px rgba(255, 51, 168, 0.5);
        }

        /* Media Query para Móviles (SIN CAMBIOS) */
        @media (max-width: 768px) {
            .collage-container {
                grid-template-columns: 1fr; 
                grid-auto-rows: minmax(33.33vh, 1fr); 
            }
            .collage-img {
                height: 100%; 
            }
            .footer {
                font-size: 0.75rem;
            }
            .footer a {
                margin: 0 8px; 
            }
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 0.9rem; }
            .footer { padding-bottom: 10px; }
        }
    </style>
</head>
